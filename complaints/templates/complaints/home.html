{% load static %}
<script src="{% static 'complaints/js/tailwind.js' %}"></script>

<div class="min-h-screen bg-gray-50">
    <nav class="bg-blue-900 p-4 text-white shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tight">CivicAlert</h1>
            <div>
                <a href="{% url 'login' %}" class="px-4 hover:underline">Login</a>
                <a href="{% url 'register' %}"
                    class="ml-4 bg-white text-blue-900 px-6 py-2 rounded-full font-semibold hover:bg-gray-100 transition">Get
                    Started</a>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-6 py-20 text-center">
        <h2 class="text-5xl font-extrabold text-gray-900 mb-6">Your Voice, Your City.</h2>
        <p class="text-xl text-gray-600 mb-10 max-w-2xl mx-auto">Report potholes, water leaks, or pollution in seconds.
            Help our administrators build a better community for everyone.</p>
        <div class="flex justify-center gap-4">
            <div class="p-6 bg-white shadow-md rounded-lg w-64">
                <div class="text-blue-600 text-3xl mb-2">📢</div>
                <h3 class="font-bold">Report Issues</h3>
            </div>
            <div class="p-6 bg-white shadow-md rounded-lg w-64">
                <div class="text-green-600 text-3xl mb-2">📍</div>
                <h3 class="font-bold">Track Fixes</h3>
            </div>
            <div class="p-6 bg-white shadow-md rounded-lg w-64">
                <div class="text-yellow-600 text-3xl mb-2">✅</div>
                <h3 class="font-bold">Stay Updated</h3>
            </div>
        </div>
    </div>
</div>
